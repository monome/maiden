name: build-release

on:
  push:
    branches:
      - main
      - feature/*
      - fix/*

    # Publish `v1.2.3` tags as releases.
    tags:
      - v*

  # Run tests for any PRs.
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build release
        run: |
          chmod +x tool/*.sh
          make release

      - uses: actions/upload-artifact@v4
        with:
          name: maiden
          path: |
            dist/maiden.tgz
